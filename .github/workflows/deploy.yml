# Instant deploys: every push to master ships the website (Cloudflare
# Worker) and the data layer (Convex prod). Needs three repo secrets —
# see docs/deployment.md → "Instant deploys".
name: Deploy
on:
  push:
    branches: [master]

jobs:
  website:
    name: Website → Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: website

  convex:
    name: Backend → Convex prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: backend
      - run: npx convex deploy
        working-directory: backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
